<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客管理 - TOMBDREAM</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: 'Noto Sans SC', sans-serif; background: #fafaf9; color: #1a1a1a; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background:#fff; border:1px solid #e8e8e3; border-radius:12px; padding:48px; text-align:center; max-width:400px; width:90%; }
    .login-title { font-family:'Lora',serif; font-size:1.5rem; font-weight:600; margin-bottom:8px; }
    .login-desc { font-size:0.9rem; color:#6b6b6b; margin-bottom:32px; }
    .login-btn { display:inline-flex; align-items:center; gap:10px; padding:12px 28px; background:#1a1a1a; color:#fafaf9; border-radius:6px; font-size:0.9rem; font-weight:500; text-decoration:none; transition:opacity 0.2s; }
    .login-btn:hover { opacity:0.85; }
    .note { font-size:0.78rem; color:#9a9a93; margin-top:20px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:16px;">📝</div>
    <h1 class="login-title">博客内容管理</h1>
    <p class="login-desc">使用 GitHub 账号登录后，即可在线撰写和发布文章。</p>
    <a href="#" class="login-btn" id="loginBtn">🚀 使用 GitHub 登录</a>
    <p class="note">首次使用需要授权 GitHub OAuth。<br>文章将直接提交到本博客的 GitHub 仓库。</p>
  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      e.preventDefault();
      var clientId = 'Ov23liyBQePXaZUY0Kh';
      var redirect = window.location.origin + '/admin/callback.html';
      var url = 'https://github.com/login/oauth/authorize?client_id=' + clientId + '&redirect_uri=' + encodeURIComponent(redirect) + '&scope=repo';
      window.location.href = url;
    });
  </script>
</body>
</html>

backend:
  name: github
  repo: TombDream/TombDream.github.io
  branch: main
  base_url: https://sveltia-cms-auth.tombdream.workers.dev

# 媒体文件存储
media_folder: public/images/uploads
public_folder: /images/uploads

# 站点 URL（用于预览）
site_url: https://tombdream.github.io

# 本地开发模式（开发时取消注释）
# local_backend: true

# 编辑器语言
locale: zh_Hans

# 集合定义
collections:
  # 博客文章
  - name: blog
    label: 博客文章
    label_singular: 文章
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - label: 标题
        name: title
        widget: string
        hint: 文章标题
      - label: 描述
        name: description
        widget: text
        hint: 简短描述，显示在文章列表和搜索结果中
      - label: 发布日期
        name: pubDate
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        default: ""
      - label: 更新日期
        name: updatedDate
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: 封面图片
        name: heroImage
        widget: image
        required: false
        hint: 推荐尺寸 1200×630
      - label: 分类
        name: category
        widget: select
        options:
          - { label: "技术", value: "技术" }
          - { label: "生活", value: "生活" }
          - { label: "随笔", value: "随笔" }
          - { label: "摄影", value: "摄影" }
          - { label: "读书", value: "读书" }
        default: 随笔
      - label: 标签
        name: tags
        widget: list
        hint: 用回车分隔多个标签
        default: []
      - label: 草稿
        name: draft
        widget: boolean
        default: false
        hint: 开启后文章不会发布
      - label: 精选
        name: featured
        widget: boolean
        default: false
        hint: 开启后文章显示在首页精选位置
      - label: 正文
        name: body
        widget: markdown
        modes:
          - rich_text
          - raw
        buttons:
          - bold
          - italic
          - link
          - heading-one
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
          - code
